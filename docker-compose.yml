version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: watchlist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       watchlist
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── WatchList API (Ktor) ────────────────────────────────────────────────────
  api:
    build: .
    container_name: watchlist_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:         8080
      DATABASE_URL:      jdbc:postgresql://postgres:5432/watchlist
      DATABASE_USER:     postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET:        "change-this-to-a-long-random-secret-in-production"
      UPLOAD_DIR:   /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"

  # ── pgAdmin (opsional, untuk manajemen DB via browser) ──────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: watchlist_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@watchlist.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    profiles:
      - dev   # hanya aktif saat: docker compose --profile dev up

volumes:
  postgres_data:
  uploads_data:
